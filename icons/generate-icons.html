<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<h2>Click each button to download the icon, then save it into this /icons folder.</h2>
<button onclick="generate(16)">Download icon16.png</button>
<button onclick="generate(48)">Download icon48.png</button>
<button onclick="generate(128)">Download icon128.png</button>
<script>
function generate(size) {
  const c = document.createElement("canvas");
  c.width = size; c.height = size;
  const ctx = c.getContext("2d");

  // Background - rounded purple square
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = "#7c3aed";
  ctx.fill();

  // Eye icon with a line through it (hidden/privacy)
  const cx = size / 2, cy = size / 2;
  const ew = size * 0.32, eh = size * 0.18;
  ctx.strokeStyle = "#f4f4f5";
  ctx.lineWidth = Math.max(1, size * 0.06);
  ctx.lineCap = "round";

  // Eye shape
  ctx.beginPath();
  ctx.ellipse(cx, cy, ew, eh, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Pupil
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = "#f4f4f5";
  ctx.fill();

  // Slash through eye
  const off = size * 0.28;
  ctx.beginPath();
  ctx.moveTo(cx - off, cy + off);
  ctx.lineTo(cx + off, cy - off);
  ctx.stroke();

  // Download
  const a = document.createElement("a");
  a.download = "icon" + size + ".png";
  a.href = c.toDataURL("image/png");
  a.click();
}
</script>
</body>
</html>
